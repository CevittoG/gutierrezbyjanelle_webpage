version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - QUOTE_CALC_PASSWORD=${QUOTE_CALC_PASSWORD}
      - QUOTE_CALC_SESSION_SECRET=${QUOTE_CALC_SESSION_SECRET}
      - GOOGLE_SHEETS_SA_EMAIL=${GOOGLE_SHEETS_SA_EMAIL}
      - GOOGLE_SHEETS_SA_PRIVATE_KEY=${GOOGLE_SHEETS_SA_PRIVATE_KEY}
      - GOOGLE_SHEETS_DOC_ID=${GOOGLE_SHEETS_DOC_ID}
      - GBJ_QUOTES_DRIVE_PARENT_ID=${GBJ_QUOTES_DRIVE_PARENT_ID}
      - GBJ_QUOTES_OWNER_EMAIL=${GBJ_QUOTES_OWNER_EMAIL}