version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    # Secrets are loaded by Next.js itself from .env and .env.local (the project
    # dir is volume-mounted above). Do NOT re-list them here as `VAR=${VAR}`:
    # Compose interpolates from .env only, so any var that lives solely in
    # .env.local (e.g. QUOTE_CALC_SESSION_SECRET) would be injected as an empty
    # string and shadow the real value — breaking the auth gate. Keep only the
    # vars that must differ from the .env files.
    environment:
      - NODE_ENV=development